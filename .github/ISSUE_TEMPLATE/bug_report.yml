name: Bug report
description: Report a reproducible problem in the harness or generated fixtures.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Generated data are workflow fixtures only and are not for clinical inference, dose selection, or regulatory model qualification.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the exact command(s), config file, and relevant paths.
      placeholder: |
        1. Run `python -m tools.pk_fixture_cli run harness_examples/demo_set.yml`
        2. Open `outputs/...`
        3. See ...
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste terminal output, manifest snippets, or error messages.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.10.3 or git SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, shell, and whether R/Quarto/simPop are installed.
      placeholder: |
        OS:
        Python:
        Shell:
        Optional tools:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I did not include private clinical data, secrets, or proprietary datasets.
          required: true
        - label: I understand generated data are workflow fixtures, not clinical or regulatory evidence.
          required: true
