name: Markdown Links

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check local Markdown links
        run: python tools/check_markdown_links.py
