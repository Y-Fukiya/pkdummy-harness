version: 0.1
study:
  id: OSP_omeprazole
  title: Omeprazole (template from label/PopPK summary)
population:
  n: 100
  covariates:
    wt_kg:
      dist: lognormal
      median: 70.0
      cv: 0.25
      min: 40
      max: 120
regimen:
  route: oral
  units:
    dose: mg
  arms:
    A:
      n: 100
      dose_mg: 100
sampling:
  t_end_h: 72.0
  dt_h: 0.5
  include_t0: true
model:
  template: pk1_oral_ode
  units:
    conc: ng/mL
    mult: 1000
  theta:
    CL: 43.56
    V: 28.0
    KA: 1.2
    F1: 1.0
    ALAG1: 0.5
  notes:
  - Default assumes CL and V from sources are apparent (CL/F, V/F). Set theta.F1 to
    your chosen bioavailability AND adjust CL/V accordingly if your sources report
    systemic CL/V.
  - 'Demo theta policy: CL and V are the independent simulation parameters for this
    1-compartment fixture. t_half is checked downstream and is not used to recalibrate
    theta.'
  - 'Known stress-test label: library validation flags CL/V/t_half structural mismatch
    for this drug, so terminal t_half WARN/FAILED can be expected in demo validation.'
iiv:
  eta:
    CL: 0.09
    V: 0.04
    KA: 0.16
  corr: false
residual:
  type: prop+add
  prop: 0.25
  add: 0.0
output:
  out_dir: outputs
  seed: 20260217
  write:
    raw_csv: true
    nonmem_csv: true
    summary_md: true
meta:
  sources:
  - https://en.wikipedia.org/wiki/Omeprazole
  - https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=d8b466e0-a35e-4fba-9d43-4e6c0122e7ad
  - https://dailymed.nlm.nih.gov/dailymed/lookup.cfm?setid=a17e415e-a559-4a8d-a455-699184a01523
  - https://pubmed.ncbi.nlm.nih.gov/2315973/
  pk_summary_raw:
    half_life: 0.5-1.2 hours
    clearance: 624 mL/min (range 59-828 mL/min)
    volume: 0.4 L/kg
    bioavailability: '35-76% (repeated doses: ~60%)'
    elimination: 肝代謝 (CYP2C19, CYP3A4), 腎排泄 (77%), 糞便排泄 (胆汁分泌由来)
