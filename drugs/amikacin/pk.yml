id: osp::amikacin
name: Amikacin
route_inferred: iv
sources:
- id: source_1
  url: https://dailymed.nlm.nih.gov/dailymed/drugInfo.cfm?setid=0b56f6df-a05d-4520-8bf0-d7cefe20f6ad
pk_raw:
  half_life: slightly over 2 hours
  clearance: about 100 mL/min
  volume_of_distribution: 24 liters (28% of the body weight)
  bioavailability: N/A (IV only)
  elimination_route: 腎排泄
pk_parsed:
  half_life_h: 2.0
  half_life_h_range:
  - 2.0
  - 2.0
  clearance:
    value: 6.0
    unit: L/h
  volume:
    value: 24.0
    unit: L
  bioavailability_frac: 1.0
  weight_ref_kg_for_abs: 70.0
  clearance_basis: systemic
  volume_basis: systemic
derived:
  ke_1_per_h: 0.25
  CL_abs_L_per_h_at_70kg: 6.0
  V_abs_L_at_70kg: 24.0
  CL_apparent_L_per_h_at_70kg: 6.0
  V_apparent_L_at_70kg: 24.0
  CL_systemic_L_per_h_at_70kg: 6.0
  V_systemic_L_at_70kg: 24.0
  notes:
  - Apparent CL/V were derived as (systemic CL/V) / F.
  - 'Basis detected/selected: systemic (CL, V). Oral models typically use F1=bioavailability
    with systemic CL/V.'
  - 'Reminder: Oral labels often report apparent parameters (CL/F, V/F). IV labels
    typically report systemic parameters.'
value_provenance:
  CL_abs_L_per_h_at_70kg:
    source_id: source_1
    source_field: mean_serum_clearance_rate
    value_basis: label_reported
    raw_value: 100.0
    raw_unit: mL/min
    normalized_value: 6.0
    normalized_unit: L/h
    conversion:
      method: unit_conversion
      formula: 100 mL/min * 60 min/h / 1000 mL/L
      assumptions: {}
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports mean serum clearance rate of about 100
      mL/min in normal adult volunteers. Clearance is used as a deterministic fixture
      model parameter and is not recalibrated to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  V_abs_L_at_70kg:
    source_id: source_1
    source_field: apparent_volume_of_distribution
    value_basis: label_reported
    raw_value: 24.0
    raw_unit: L
    normalized_value: 24.0
    normalized_unit: L
    conversion:
      method: direct
      formula: pk_parsed.volume.value
      assumptions: {}
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports apparent volume of distribution of 24
      L in normal adult volunteers. Volume is retained as the one-compartment fixture
      volume and is not recalibrated to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  t_half_h:
    source_id: source_1
    source_field: serum_half_life_normal_adult_volunteers
    value_basis: derived_from_reported
    raw_value: slightly over 2
    raw_unit: h
    normalized_value: 2.0
    normalized_unit: h
    conversion:
      method: derived_formula
      formula: reported "slightly over 2 hours" retained as 2.0 h fixture value
      assumptions:
        fixture_rounding: slightly_over_two_hours_to_2.0_h
    role: check_only
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports serum half-life in normal adult volunteers
      as slightly over 2 h. Canonical t_half_h retains the fixture-rounded value and
      remains a check target only. CL and V are not jointly calibrated to match terminal
      half-life in this deterministic one-compartment fixture.
    source_review_status: checked
    fixture_limitation_status: acknowledged
