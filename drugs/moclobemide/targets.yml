scenario:
  id: moclobemide_dose100mg_po_single
  route: po
  regimen: single
  dose:
    value: 100.0
    unit: mg
  population:
    species: human
    group: adult_healthy
targets:
  auc:
    type: AUC0-inf
    value: 1282.0512820512822
    unit: ng*h/mL
    summary: geometric_mean
    variability:
      type: gcv_percent
      value: 35
  t_half:
    phase: terminal
    value: 1.5
    unit: h
    summary: arithmetic_mean
    variability:
      type: sd
      value: 1.0
notes:
- AUC is computed as Dose/CL (assuming CL is apparent CL/F for oral, and systemic
  CL for IV).
- Variability fields are placeholders unless you replace them with drug-specific PopPK
  values.
- 'AUC target provenance: computed as Dose/CL from the extracted CL used by this fixture.
  It is an integration consistency check, not an independent literature AUC or clinical
  validity claim. To validate against a literature AUC, replace targets.auc.value/unit/summary
  and add the source, raw text, unit conversion, and derivation note.'
- 'Parameter-pair policy: spec theta uses CL and V from pk.yml derived absolute values
  as the independent simulation parameters. The literature t_half is retained as a
  target/check and is not used to recalibrate CL or V automatically.'
- 'Known 1-compartment attainability issue: CL/V-implied t_half differs from pk_parsed.half_life_h
  beyond the library warning threshold. t_half WARN/FAILED in demo validation may
  be expected and this drug can be used as a stress-test fixture.'
