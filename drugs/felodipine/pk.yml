id: osp::felodipine
name: Felodipine
route_inferred: po
sources:
- id: source_1
  url: https://pubmed.ncbi.nlm.nih.gov/1782737/
- id: source_2
  url: https://pubmed.ncbi.nlm.nih.gov/3327676/
pk_raw:
  half_life: 24-25 hours
  clearance: 1-1.5 L/min
  volume_of_distribution: 10 L/kg
  bioavailability: 15%
  elimination_route: 肝代謝
pk_parsed:
  half_life_h: 24.5
  half_life_h_range:
  - 24.0
  - 25.0
  clearance:
    value: 90.0
    unit: L/h
  volume:
    value: 10.0
    unit: L/kg
  bioavailability_frac: 0.15
  weight_ref_kg_for_abs: 70.0
  clearance_basis: systemic
  volume_basis: systemic
  clearance_basis_source: unit_inferred
  clearance_basis_note: 'clearance_basis set to systemic: source clearance is reported
    in a mL/min-family unit (systemic plasma/renal clearance), not apparent CL/F.
    Inferred from the source unit, not verified against full label text. NOTE: the
    spec simulates a self-consistent fixture profile and is not calibrated to systemic-CL
    + F (clinical exposure would use CL_apparent or F1=bioavailability); these remain
    fixture values, not clinical PK.'
derived:
  ke_1_per_h: 0.12857142857142856
  CL_abs_L_per_h_at_70kg: 90.0
  V_abs_L_at_70kg: 700.0
  CL_apparent_L_per_h_at_70kg: 600.0
  V_apparent_L_at_70kg: 4666.666666666667
  CL_systemic_L_per_h_at_70kg: 90.0
  V_systemic_L_at_70kg: 700.0
  notes:
  - Apparent CL/V were derived as (systemic CL/V) / F.
  - 'Basis detected/selected: systemic (CL, V). Oral models typically use F1=bioavailability
    with systemic CL/V.'
  - 'Reminder: Oral labels often report apparent parameters (CL/F, V/F). IV labels
    typically report systemic parameters.'
value_provenance:
  CL_abs_L_per_h_at_70kg:
    source_id: source_2
    source_field: mean_total_clearance_from_blood
    value_basis: derived_from_reported
    raw_value: 1-1.5
    raw_unit: L/min
    normalized_value: 90.0
    normalized_unit: L/h
    conversion:
      method: unit_conversion
      formula: upper bound of reported clearance range (1.5 L/min) * 60 min/h
      assumptions:
        range_summary: upper_bound
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: PubMed source_2 reports mean total clearance from blood of 1 to
      1.5 L/min. Clearance is used as a deterministic fixture model parameter and
      is not recalibrated to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  V_abs_L_at_70kg:
    source_id: source_2
    source_field: volume_of_distribution
    value_basis: derived_from_reported
    raw_value: 10.0
    raw_unit: L/kg
    normalized_value: 700.0
    normalized_unit: L
    conversion:
      method: body_weight_scaled
      formula: pk_parsed.volume.value * pk_parsed.weight_ref_kg_for_abs
      assumptions:
        weight_ref_kg_for_abs: 70.0
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: PubMed source_2 reports felodipine volume of distribution of about
      10 L/kg. Volume is retained as the one-compartment fixture volume and is not
      recalibrated to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  t_half_h:
    source_id: source_2
    source_field: mean_elimination_half_life
    value_basis: derived_from_reported
    raw_value: approximately 25
    raw_unit: h
    normalized_value: 24.5
    normalized_unit: h
    conversion:
      method: derived_formula
      formula: fixture midpoint of local 24-25 h range, source-confirmed as approximately
        25 h
      assumptions:
        source_precision: approximate
        range_summary: midpoint
    role: check_only
    reviewer_status: checked
    reviewer_note: PubMed source_2 reports felodipine mean elimination half-life of
      approximately 25 h. Canonical t_half_h retains the fixture midpoint of the local
      24-25 h range and remains a check target only. CL and V are not jointly calibrated
      to match terminal half-life in this deterministic one-compartment fixture.
    source_review_status: checked
    fixture_limitation_status: acknowledged
