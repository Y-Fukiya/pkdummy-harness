id: osp::alfentanil
name: Alfentanil
route_inferred: iv
sources:
- id: source_1
  url: https://dailymed.nlm.nih.gov/dailymed/downloadpdffile.cfm?setId=c965d63f-933b-4a83-88f6-c8c74159530b
pk_raw:
  half_life: 90-111 minutes
  clearance: 5 mL/kg/min
  volume_of_distribution: 0.4-1 L/kg
  bioavailability: N/A (IV only)
  elimination_route: 肝代謝, 腎排泄
pk_parsed:
  half_life_h: 1.675
  half_life_h_range:
  - 1.5
  - 1.85
  clearance:
    value: 0.3
    unit: L/h/kg
  volume:
    value: 1.0
    unit: L/kg
  bioavailability_frac: 1.0
  weight_ref_kg_for_abs: 70.0
  clearance_basis: systemic
  volume_basis: systemic
derived:
  ke_1_per_h: 0.3
  CL_abs_L_per_h_at_70kg: 21.0
  V_abs_L_at_70kg: 70.0
  CL_apparent_L_per_h_at_70kg: 21.0
  V_apparent_L_at_70kg: 70.0
  CL_systemic_L_per_h_at_70kg: 21.0
  V_systemic_L_at_70kg: 70.0
  notes:
  - Apparent CL/V were derived as (systemic CL/V) / F.
  - 'Basis detected/selected: systemic (CL, V). Oral models typically use F1=bioavailability
    with systemic CL/V.'
  - 'Reminder: Oral labels often report apparent parameters (CL/F, V/F). IV labels
    typically report systemic parameters.'
value_provenance:
  CL_abs_L_per_h_at_70kg:
    source_id: source_1
    source_field: average_plasma_clearance
    value_basis: derived_from_reported
    raw_value: 5.0
    raw_unit: mL/kg/min
    normalized_value: 21.0
    normalized_unit: L/h
    conversion:
      method: body_weight_scaled
      formula: 5 mL/kg/min * 70 kg * 60 min/h / 1000 mL/L
      assumptions:
        weight_ref_kg_for_abs: 70.0
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports average plasma clearance of 5 mL/kg/min.
      Clearance is used as a deterministic fixture model parameter and is not recalibrated
      to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  V_abs_L_at_70kg:
    source_id: source_1
    source_field: apparent_volume_of_distribution_range
    value_basis: derived_from_reported
    raw_value: 0.4-1.0
    raw_unit: L/kg
    normalized_value: 70.0
    normalized_unit: L
    conversion:
      method: body_weight_scaled
      formula: upper bound of reported apparent volume range (1 L/kg) * 70 kg
      assumptions:
        range_summary: upper_bound
        weight_ref_kg_for_abs: 70.0
    role: simulation_parameter
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports apparent volume of distribution of 0.4
      to 1 L/kg. Canonical V_abs_L_at_70kg retains the upper-bound fixture value and
      is not recalibrated to force agreement with terminal half-life.
    source_review_status: checked
    fixture_limitation_status: not_applicable
  t_half_h:
    source_id: source_1
    source_field: terminal_elimination_half_life_range
    value_basis: derived_from_reported
    raw_value: 90-111
    raw_unit: min
    normalized_value: 1.675
    normalized_unit: h
    conversion:
      method: derived_formula
      formula: mean of reported 90-111 min range / 60 min/h
      assumptions:
        range_summary: midpoint
    role: check_only
    reviewer_status: checked
    reviewer_note: DailyMed source_1 reports terminal elimination half-life of 90
      to 111 minutes. Canonical t_half_h uses the midpoint converted to hours and
      remains a check target only. CL and V are not jointly calibrated to match terminal
      half-life in this deterministic one-compartment fixture.
    source_review_status: checked
    fixture_limitation_status: acknowledged
