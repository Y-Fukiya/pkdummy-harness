version: 0.1
study:
  id: OSP_alfentanil
  title: Alfentanil (IV template from label/PopPK summary)
population:
  n: 100
  covariates:
    wt_kg:
      dist: lognormal
      median: 70.0
      cv: 0.25
      min: 40
      max: 120
regimen:
  route: iv_bolus
  units:
    dose: mg
  arms:
    A:
      n: 100
      dose_mg: 100
sampling:
  t_end_h: 72.0
  dt_h: 0.5
  include_t0: true
model:
  template: pk1_iv_ode
  units:
    conc: ng/mL
    mult: 1000
  theta:
    CL: 21.0
    V: 70.0
  notes:
  - 'Demo theta policy: CL and V are the independent simulation parameters for this
    1-compartment fixture. t_half is checked downstream and is not used to recalibrate
    theta.'
  - 'Known stress-test label: library validation flags CL/V/t_half structural mismatch
    for this drug, so terminal t_half WARN/FAILED can be expected in demo validation.'
iiv:
  eta:
    CL: 0.09
    V: 0.04
  corr: false
residual:
  type: prop+add
  prop: 0.25
  add: 0.0
output:
  out_dir: outputs
  seed: 20260217
  write:
    raw_csv: true
    nonmem_csv: true
    summary_md: true
meta:
  sources:
  - https://dailymed.nlm.nih.gov/dailymed/downloadpdffile.cfm?setId=c965d63f-933b-4a83-88f6-c8c74159530b
  pk_summary_raw:
    half_life: 90-111 minutes
    clearance: 5 mL/kg/min
    volume: 0.4-1 L/kg
    bioavailability: N/A (IV only)
    elimination: 肝代謝, 腎排泄
