version: 0.1
study:
  id: OSP_cimetidine
  title: Cimetidine (template from label/PopPK summary)
population:
  n: 100
  covariates:
    wt_kg:
      dist: lognormal
      median: 70.0
      cv: 0.25
      min: 40
      max: 120
regimen:
  route: oral
  units:
    dose: mg
  arms:
    A:
      n: 100
      dose_mg: 100
sampling:
  t_end_h: 72.0
  dt_h: 0.5
  include_t0: true
model:
  template: pk1_oral_ode
  units:
    conc: ng/mL
    mult: 1000
  theta:
    CL: 30.0
    V: 56.0
    KA: 1.2
    F1: 1.0
    ALAG1: 0.5
  notes:
  - Default assumes CL and V from sources are apparent (CL/F, V/F). Set theta.F1 to
    your chosen bioavailability AND adjust CL/V accordingly if your sources report
    systemic CL/V.
  - 'Demo theta policy: CL and V are the independent simulation parameters for this
    1-compartment fixture. t_half is checked downstream and is not used to recalibrate
    theta.'
  - 'Known stress-test label: library validation flags CL/V/t_half structural mismatch
    for this drug, so terminal t_half WARN/FAILED can be expected in demo validation.'
iiv:
  eta:
    CL: 0.09
    V: 0.04
    KA: 0.16
  corr: false
residual:
  type: prop+add
  prop: 0.25
  add: 0.0
output:
  out_dir: outputs
  seed: 20260217
  write:
    raw_csv: true
    nonmem_csv: true
    summary_md: true
meta:
  sources:
  - https://dailymed.nlm.nih.gov/dailymed/lookup.cfm?setid=496e258d-a5fd-42da-9a86-73afc8be359b
  pk_summary_raw:
    half_life: 2 hours
    clearance: 500 mL/min
    volume: 0.8 L/kg
    bioavailability: 60-70%
    elimination: 腎排泄
