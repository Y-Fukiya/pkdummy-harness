version: 0.1
study:
  id: OSP_inulin
  title: Inulin (IV template from label/PopPK summary)
population:
  n: 100
  covariates:
    wt_kg:
      dist: lognormal
      median: 70.0
      cv: 0.25
      min: 40
      max: 120
regimen:
  route: iv_bolus
  units:
    dose: mg
  arms:
    A:
      n: 100
      dose_mg: 100
sampling:
  t_end_h: 72.0
  dt_h: 0.5
  include_t0: true
model:
  template: pk1_iv_ode
  units:
    conc: ng/mL
    mult: 1000
  theta:
    CL: 7.2
    V: 16.0
  notes:
  - 'Demo theta policy: CL and V are the independent simulation parameters for this
    1-compartment fixture. t_half is checked downstream and is not used to recalibrate
    theta.'
  - 'Known stress-test label: library validation flags CL/V/t_half structural mismatch
    for this drug, so terminal t_half WARN/FAILED can be expected in demo validation.'
iiv:
  eta:
    CL: 0.09
    V: 0.04
  corr: false
residual:
  type: prop+add
  prop: 0.25
  add: 0.0
output:
  out_dir: outputs
  seed: 20260217
  write:
    raw_csv: true
    nonmem_csv: true
    summary_md: true
meta:
  sources:
  - https://go.drugbank.com/drugs/DB00638
  - https://www.sciencedirect.com/topics/immunology-and-microbiology/elimination-half-life
  pk_summary_raw:
    half_life: 2-4 hours
    clearance: 7.2 L/hr
    volume: 16 L
    bioavailability: N/A (IV only)
    elimination: 腎排泄
